name: Spec Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spec-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint specs
        run: npm run spec:lint

      - name: Validate traceability
        run: npm run spec:trace

      - name: Run tests
        run: npm test -- --run

      - name: Firestore rules tests
        run: npm run test:rules
