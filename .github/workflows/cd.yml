name: CD

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase env
        run: |
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_STORAGE_BUCKET"
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID"
          test -n "$VITE_FIREBASE_APP_ID"

      - name: Create .env
        run: |
          printf "VITE_FIREBASE_API_KEY=%s\n" "$VITE_FIREBASE_API_KEY" > .env
          printf "VITE_FIREBASE_AUTH_DOMAIN=%s\n" "$VITE_FIREBASE_AUTH_DOMAIN" >> .env
          printf "VITE_FIREBASE_PROJECT_ID=%s\n" "$VITE_FIREBASE_PROJECT_ID" >> .env
          printf "VITE_FIREBASE_STORAGE_BUCKET=%s\n" "$VITE_FIREBASE_STORAGE_BUCKET" >> .env
          printf "VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n" "$VITE_FIREBASE_MESSAGING_SENDER_ID" >> .env
          printf "VITE_FIREBASE_APP_ID=%s\n" "$VITE_FIREBASE_APP_ID" >> .env

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Firebase service account file
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json

          test -s /tmp/sa.json
          jq -e '.type == "service_account"' /tmp/sa.json
          jq -e '.project_id == "genai-sdd-app"' /tmp/sa.json
          jq -e '.client_email' /tmp/sa.json

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: firebase deploy --only hosting --project genai-sdd-app

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/sa.json
          rm -f .env
